<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="year-container">
        <span style="font-size:xx-large; color:lightgray; margin-left: 7px;"><span id="year"></span></span>
        <span style="font-size:large; color:rgb(167, 167, 167); margin-left: 4px; margin-top: 10px;"><span id="turn"></span></span>
        <span style="font-size:xx-large; color:rgb(155, 155, 155); margin-left:12px; margin-right:12px;">|</span>
        <span style="font-size:large; color:rgb(167, 167, 167); margin-left: 4px; margin-top: 4px;">👑</span>
        <span style="font-size:xx-large; color:rgb(155, 155, 155); margin-left:12px; margin-right:12px;">|</span>
        <span style="font-size:small; color:lightgray; margin-left: 4px; margin-top:4px">Emperor, Karl IV<br>Empress, Ashley</span>
        <span style="font-size:xx-large; color:rgb(155, 155, 155); margin-left:12px; margin-right:12px;">|</span>
        <span style="font-size:small; color:lightgray; margin-left: 4px; margin-top:4px">Prime Minister,<br>Her Majesty Ashley Moadstein</span>
    </div>
    <div class="tab-container">
        <a href="index.html" class="button-link">Home</a>
        <a href="parliament.html" class="button-link">Parliament</a>
        <a href="region-map.html" class="button-link">The Empire</a>
        <a href="elections.html" class="button-link">Elections</a>
        <a href="parties.html" class="button-link active">Parties</a>
        <a href="royal-tree.html" class="button-link">Royal Family</a>
        <a href="world-map.html" class="button-link">World Map</a>
    </div>
    <div class="page" style="width:100%;">
        <div class="element-container" style="margin-top: 40px; overflow:auto;">
            <div id="party-buttons" style="margin-bottom: 12px; display: flex; gap: 8px; flex-wrap: wrap;"></div>
            <div id="region-map-container" style="width: 100%; height: auto;"></div>
        </div>
    </div>
    <div class="footer">
    </div>
    <div id="map-tooltip" style="position:fixed; display:none; pointer-events:none; background:rgba(30,30,30,0.85); color:#eee; padding:6px 10px; border-radius:5px; font-size:13px; z-index:9999; white-space:nowrap;"></div>
</body>
<script type="module">
    import { gameDetails } from './scripts/game_details.js';
    const yearElements = document.querySelectorAll('#year');
    yearElements.forEach(el => el.textContent = gameDetails.year);

    const turnElements = document.querySelectorAll('#turn');
    turnElements.forEach(el => el.textContent = gameDetails.turn);

    const [svgResp, popularityResp, partiesResp] = await Promise.all([
        fetch('images/maps/region_map.svg'),
        fetch('information/region_popularity.json'),
        fetch('information/parties.json')
    ]);
    const svgText = await svgResp.text();
    const popularity = await popularityResp.json();
    const parties = await partiesResp.json();

    const container = document.getElementById('region-map-container');
    const parser = new DOMParser();
    const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
    const svgEl = svgDoc.documentElement;
    svgEl.style.width = '100%';
    svgEl.style.height = 'auto';
    container.appendChild(document.importNode(svgEl, true));

    const tooltip = document.getElementById('map-tooltip');
    const br = 139, bgc = 139, bb = 139;

    function applyParty(partyId) {
        const color = parties[partyId];
        if (!color) return;
        const pr = parseInt(color.slice(1, 3), 16);
        const pg = parseInt(color.slice(3, 5), 16);
        const pb = parseInt(color.slice(5, 7), 16);

        for (const [regionId, regionData] of Object.entries(popularity)) {
            const polygon = document.getElementById(regionId);
            if (!polygon) continue;
            const pop = regionData[partyId] ?? 0;
            const t = pop / 50;
            const r = Math.round(pr * t + br * (1 - t));
            const g = Math.round(pg * t + bgc * (1 - t));
            const b = Math.round(pb * t + bb * (1 - t));
            polygon.style.removeProperty('fill');
            polygon.setAttribute('fill', `rgb(${r},${g},${b})`);
            polygon.removeAttribute('fill-opacity');

            const label = regionId.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            polygon.style.cursor = 'pointer';
            polygon.onmousemove = (e) => {
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 14) + 'px';
                tooltip.style.top = (e.clientY + 14) + 'px';
                tooltip.innerHTML = `<strong>${label}</strong><br>${partyId} &mdash; ${pop * 2}%`;
            };
            polygon.onmouseleave = () => { tooltip.style.display = 'none'; };
        }
    }

    const buttonsDiv = document.getElementById('party-buttons');
    let activeBtn = null;
    for (const partyId of Object.keys(parties)) {
        const btn = document.createElement('button');
        btn.textContent = partyId;
        btn.className = 'party-btn';
        btn.style.background = parties[partyId];
        btn.addEventListener('click', () => {
            if (activeBtn) activeBtn.classList.remove('active');
            btn.classList.add('active');
            activeBtn = btn;
            applyParty(partyId);
        });
        buttonsDiv.appendChild(btn);
    }

    // Apply first party by default
    const firstParty = Object.keys(parties)[0];
    const firstBtn = buttonsDiv.firstChild;
    firstBtn.classList.add('active');
    activeBtn = firstBtn;
    applyParty(firstParty);
</script>
</html>
