<h1 style="font-family:'Faculty Glyphic',serif; margin-top:0">Bailectein</h2>
<p style="color:#000000; font-family: 'Viaoda Libre'; font-size:large;">
    Bailectein is the second most core province of Bailech, it is located in the large Bailectein valley between the Medvele Mountains and Molonian highlands.
    It has many small towns dispersed through the productive agricultural land.
</p><br>
