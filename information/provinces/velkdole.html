<h1 style="font-family:'Faculty Glyphic',serif; margin-top:0">Velkdole</h2>
<p style="color:#000000; font-family: 'Viaoda Libre'; font-size:large;">
    Velkdole is the most populated region of Histochea centered around the Velkdoli valley and the city of Velkdoli, capital of Histochea.
    It is the heart of Histochean culture and progressivism.
    Velkdole is the Bailech name for Velkdoli.
</p><br>
