<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Region Map</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { width: 100%; height: 600px; background: #2a2a2a; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="year-container">
        <span style="font-size:xx-large; color:lightgray; margin-left: 7px;"><span id="year"></span></span>
        <span style="font-size:large; color:rgb(167, 167, 167); margin-left: 4px; margin-top: 10px;"><span id="turn"></span></span>
        <span style="font-size:xx-large; color:rgb(155, 155, 155); margin-left:12px; margin-right:12px;">|</span>
        <span style="font-size:large; color:rgb(167, 167, 167); margin-left: 4px; margin-top: 4px;">👑</span>
        <span style="font-size:xx-large; color:rgb(155, 155, 155); margin-left:12px; margin-right:12px;">|</span>
        <span style="font-size:small; color:lightgray; margin-left: 4px; margin-top:4px">Emperor, Karl IV<br>Empress, Ashley</span>
        <span style="font-size:xx-large; color:rgb(155, 155, 155); margin-left:12px; margin-right:12px;">|</span>
        <span style="font-size:small; color:lightgray; margin-left: 4px; margin-top:4px">Prime Minister,<br>Her Majesty Ashley Moadstein</span>
    </div>
    <div class="tab-container">
        <a href="index.html" class="button-link">Home</a>
        <a href="parliament.html" class="button-link">Parliament</a>
        <a href="region-map.html" class="button-link active">The Empire</a>
        <a href="elections.html" class="button-link">Elections</a>
        <a href="parties.html" class="button-link">Parties</a>
        <a href="royal-tree.html" class="button-link">Royal Family</a>
        <a href="world-map.html" class="button-link">World Map</a>
    </div>
    <div class="bailech-pattern"></div>
    <div class="page">
        <div class="element-container">
            <span style="font-family:Faculty Glyphic">Regional Map of the Bailech Empire - <span id="year"></span></span>
            <div id="map" style="margin-top:24px;"></div>
        </div>
    </div>
    <div class="footer">
    </div>
</body>
<script type="module">
    import { gameDetails } from './scripts/game_details.js';
    const yearElements = document.querySelectorAll('#year');
    yearElements.forEach(el => el.textContent = gameDetails.year);

    const turnElements = document.querySelectorAll('#turn');
    turnElements.forEach(el => el.textContent = gameDetails.turn);

    const IMG_W = 1087;
    const IMG_H = 1340;

    window.addEventListener('load', () => {
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -2,
            maxZoom:  4,
            zoomSnap: 0.25,
        });

        const bounds = [[0, 0], [IMG_H, IMG_W]];

        const layerBase    = L.imageOverlay('images/maps/region_map_base.png',    bounds);
        const layerTerrain = L.imageOverlay('images/maps/region_map_terrain.png', bounds);
        const layerDetails = L.imageOverlay('images/maps/region_map_details.png', bounds);
        const layerText    = L.imageOverlay('images/maps/region_map_text.png',    bounds);

        layerBase.addTo(map);
        layerTerrain.addTo(map);
        layerDetails.addTo(map);
        layerText.addTo(map);
        map.fitBounds(bounds);

        L.control.layers(null, {
            'Terrain':       layerTerrain,
            'Cities':       layerDetails,
            'Labels & Information': layerText,
        }, { collapsed: false }).addTo(map);
    });
</script>
</html>
